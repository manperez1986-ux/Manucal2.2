<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Mercado Manu</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a15">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MercadoManu">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a15; --card:#161628; --a1:#ff6b35; --a2:#ffd23f;
      --a3:#06d6a0; --a5:#00b4d8;
      --text:#ffffff; --sub:#aaaacc; --border:rgba(255,255,255,0.1);
      --foot-bg:rgba(10,10,21,0.97); --nav-bg:rgba(10,10,21,0.97);
      --inp-bg:rgba(255,255,255,0.08); --inp-border:rgba(255,255,255,0.15);
      --sug-bg:#1c1c30;
    }
    body.light{
      --bg:#e8edf8; --card:#ffffff; --a1:#cc4400; --a2:#9a6600;
      --a3:#006b48; --a5:#005f8a;
      --text:#0a0a20; --sub:#444466; --border:rgba(0,0,0,0.12);
      --foot-bg:rgba(232,237,248,0.98); --nav-bg:rgba(232,237,248,0.98);
      --inp-bg:rgba(0,0,20,0.06); --inp-border:rgba(0,0,0,0.2);
      --sug-bg:#ffffff;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html{height:100%;}
    body{background:var(--bg);font-family:'Nunito',sans-serif;overflow-x:hidden;overflow-y:auto;overscroll-behavior-y:contain;padding:12px 12px 170px;color:var(--text);transition:background .3s,color .3s;min-height:100%;}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(255,107,53,0.1) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(6,214,160,0.08) 0%,transparent 50%);transition:opacity .3s;}
    body.light::before{opacity:.25;}

    /* SIN card::before en modo claro para no degradar colores */
    .card{background:var(--card);border-radius:22px;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.18);margin-bottom:14px;overflow:hidden;position:relative;z-index:1;transition:background .3s,border-color .3s;}
    /* Solo el brillo sutil en modo oscuro */
    body:not(.light) .card::before{content:'';position:absolute;inset:0;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}

    .inp{background:var(--inp-bg);border-radius:14px;padding:13px 16px;font-size:16px;border:1.5px solid var(--inp-border);outline:none;font-weight:800;width:100%;font-family:'Nunito',sans-serif;text-transform:uppercase;color:var(--text);transition:border-color .2s,background .3s;}
    .inp:focus{border-color:var(--a5);}
    .inp::placeholder{color:var(--sub);font-weight:700;}

    .btn{border-radius:16px;font-weight:900;padding:15px;width:100%;text-transform:uppercase;border:none;font-size:14px;font-family:'Nunito',sans-serif;cursor:pointer;letter-spacing:.5px;position:relative;overflow:hidden;transition:transform .1s;color:#fff;}
    .btn:active{transform:scale(0.96);}
    .btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.18),transparent);pointer-events:none;}
    .btn-blue  {background:linear-gradient(135deg,#00c8f0,#0066cc);box-shadow:0 4px 18px rgba(0,180,216,0.5);}
    .btn-orange{background:linear-gradient(135deg,#ff6b35,#e05000);box-shadow:0 4px 18px rgba(255,107,53,0.5);}
    .btn-green {background:linear-gradient(135deg,#06d6a0,#00956e);box-shadow:0 4px 18px rgba(6,214,160,0.5);}

    /* HISTORIAL DESPLEGABLE */
    .hist-item{margin-bottom:12px;border-radius:20px;border:1px solid var(--border);overflow:hidden;background:var(--card);box-shadow:0 3px 16px rgba(0,0,0,0.18);}
    .hist-head{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;cursor:pointer;gap:8px;user-select:none;}
    body:not(.light) .hist-head{background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));}
    body.light .hist-head{background:linear-gradient(135deg,rgba(0,95,138,0.08),rgba(0,95,138,0.02));}
    .hist-body{display:none;padding:14px;border-top:1px solid var(--border);}
    .hist-body.open{display:block;}
    .hist-arrow{font-size:14px;transition:transform .3s;color:var(--a5);flex-shrink:0;}
    .hist-arrow.open{transform:rotate(180deg);}

    .nav{position:fixed;bottom:0;left:0;right:0;height:84px;background:var(--nav-bg);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 28px;z-index:100;transition:background .3s;}
    .ni{display:flex;flex-direction:column;align-items:center;color:var(--sub);font-size:9px;font-weight:900;text-transform:uppercase;cursor:pointer;gap:3px;transition:color .2s;}
    .ni.on{color:var(--a5);}
    .ni svg{width:26px;height:26px;}
    .ni .dot{width:4px;height:4px;border-radius:50%;background:var(--a5);opacity:0;transition:opacity .2s;}
    .ni.on .dot{opacity:1;}

    .sug{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sug-bg);border-radius:14px;border:1px solid var(--border);box-shadow:0 12px 32px rgba(0,0,0,0.25);z-index:999;max-height:200px;overflow-y:auto;}
    .si{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;cursor:pointer;color:var(--text);}
    .si:last-child{border-bottom:none;}

    .gh{font-size:10px;font-weight:900;padding:8px 14px;text-transform:uppercase;letter-spacing:1.5px;background:linear-gradient(90deg,rgba(0,180,216,0.18),transparent);color:var(--a5);border-left:3px solid var(--a5);}

    .foot{position:fixed;bottom:84px;left:0;right:0;background:var(--foot-bg);backdrop-filter:blur(16px);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);z-index:90;transition:background .3s;}
    .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:20px;}
    .abox{background:var(--card);border-radius:20px;border:1px solid var(--border);width:100%;max-width:290px;text-align:center;overflow:hidden;}

    @keyframes sp{100%{transform:rotate(360deg);}}
    .spin{animation:sp .8s linear infinite;}
    @keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    input{text-transform:uppercase;caret-color:var(--a5);}

    #ib{display:none;position:fixed;bottom:88px;left:10px;right:10px;background:var(--card);border:1px solid rgba(0,180,216,0.4);color:var(--text);border-radius:18px;padding:12px 14px;z-index:150;flex-direction:row;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,180,216,0.2);}
    .tab{display:none;}
    .tab.on{display:block;}

    /* BADGES - colores sólidos para buena lectura en ambos modos */
    .badge{display:inline-flex;align-items:center;font-weight:900;font-size:11px;padding:3px 9px;border-radius:8px;}
    .badge-o{background:rgba(255,107,53,0.2);border:1.5px solid rgba(255,107,53,0.5);color:var(--a1);}
    .badge-g{background:rgba(6,214,160,0.15);border:1.5px solid rgba(6,214,160,0.4);color:var(--a3);}
    body.light .badge-o{background:rgba(204,68,0,0.1);border:1.5px solid var(--a1);color:var(--a1);}
    body.light .badge-g{background:rgba(0,107,72,0.1);border:1.5px solid var(--a3);color:var(--a3);}

    /* Texto modo claro: forzar color sólido donde haga falta */
    body.light .gh{background:linear-gradient(90deg,rgba(0,95,138,0.12),transparent);}
  </style>
</head>
<body>

<!-- ALERTA -->
<div id="ov" class="ov">
  <div class="abox">
    <div style="padding:24px 20px 16px">
      <p id="at" style="font-size:17px;font-weight:900;color:var(--text)"></p>
      <p id="am" style="font-size:12px;color:var(--sub);margin-top:8px;font-weight:700"></p>
    </div>
    <div style="display:flex;border-top:1px solid var(--border)">
      <button onclick="ca(0)" style="flex:1;padding:15px;font-size:13px;font-weight:800;color:var(--sub);background:none;border:none;border-right:1px solid var(--border);text-transform:uppercase;cursor:pointer;font-family:'Nunito',sans-serif">No</button>
      <button id="bc" style="flex:1;padding:15px;font-size:13px;font-weight:900;color:#ff3b30;background:none;border:none;text-transform:uppercase;cursor:pointer;font-family:'Nunito',sans-serif">Sí</button>
    </div>
  </div>
</div>

<!-- BANNER INSTALAR -->
<div id="ib">
  <span style="font-size:24px">🛒</span>
  <div style="flex:1"><p style="font-weight:900;font-size:13px;color:var(--text)">Instalar MercadoManu</p><p style="font-size:10px;color:var(--sub)">App rápida sin internet</p></div>
  <button onclick="instApp()" class="btn btn-blue" style="width:auto;padding:8px 16px;font-size:11px;border-radius:10px">Instalar</button>
  <button onclick="hideIB()" style="background:none;border:none;color:var(--sub);font-size:18px;cursor:pointer;padding:4px">✕</button>
</div>

<!-- ══ MERCADO ══ -->
<div id="secCalc" class="tab on">
  <div class="card">
    <div id="hdr" style="padding:20px 16px 26px;background:linear-gradient(135deg,#ff6b35 0%,#ffd23f 50%,#ff6b35 100%);background-size:200% 200%;animation:gradShift 4s ease infinite;text-align:center;position:relative;overflow:hidden;">
      <div style="position:absolute;top:-20px;right:-20px;width:120px;height:120px;background:rgba(255,255,255,0.1);border-radius:50%;pointer-events:none;"></div>
      <div style="position:absolute;bottom:-30px;left:-10px;width:80px;height:80px;background:rgba(255,255,255,0.07);border-radius:50%;pointer-events:none;"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:relative;gap:8px">
        <div style="background:rgba(0,0,0,0.22);padding:7px 12px;border-radius:20px;display:flex;align-items:center;gap:6px;border:1px solid rgba(255,255,255,0.25);flex-shrink:0">
          <span style="font-size:9px;font-weight:900;font-style:italic;color:#fff">BCV</span>
          <input type="tel" id="tasa" value="36,50" style="background:transparent;width:52px;font-weight:900;border:none;outline:none;color:#fff;text-align:center;font-size:14px;font-family:'Nunito',sans-serif" oninput="calc()">
          <button onclick="getBCV()" style="background:none;border:none;color:#fff;cursor:pointer;padding:0;display:flex">
            <svg id="ri" style="width:15px;height:15px" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          </button>
        </div>
        <button onclick="toggleMode()" id="modeBtn" style="background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.25);color:#fff;width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">🌙</button>
        <button onclick="sa('¿VACIAR CARRITO?','Se perderán los cambios.',function(){vaciarTodo();})" style="background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:7px 12px;border-radius:20px;font-size:9px;font-weight:900;text-transform:uppercase;cursor:pointer;font-family:'Nunito',sans-serif;flex-shrink:0">🗑 Vaciar</button>
      </div>
      <div id="ds" style="font-size:clamp(2.2rem,12vw,4rem);font-weight:900;letter-spacing:-2px;line-height:1.05;padding-bottom:4px;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.25)">0,00</div>
      <div id="de" style="font-size:13px;font-weight:800;margin-top:12px;padding:5px 18px;background:rgba(0,0,0,0.22);border-radius:20px;display:inline-block;font-style:italic;color:#fff;border:1px solid rgba(255,255,255,0.2)">0,00 Bs</div>
    </div>
    <div style="padding:14px 14px 16px">
      <div style="display:flex;gap:6px;background:var(--inp-bg);border-radius:14px;padding:4px;margin-bottom:14px;border:1px solid var(--border)">
        <button id="bU" onclick="setM('USD')" style="flex:1;padding:9px;border-radius:11px;font-size:11px;font-weight:900;background:linear-gradient(135deg,#ff6b35,#ffd23f);color:#1a0a00;border:none;text-transform:uppercase;cursor:pointer;font-family:'Nunito',sans-serif;box-shadow:0 2px 10px rgba(255,107,53,0.5)">💵 Dólares</button>
        <button id="bB" onclick="setM('BS')" style="flex:1;padding:9px;border-radius:11px;font-size:11px;font-weight:900;background:transparent;color:var(--sub);border:none;text-transform:uppercase;cursor:pointer;font-family:'Nunito',sans-serif">🇻🇪 Bolívares</button>
      </div>
      <input type="tel" id="presu" placeholder="PRESUPUESTO..." style="width:100%;text-align:center;font-size:30px;font-weight:900;background:transparent;border:none;outline:none;color:var(--text);font-family:'Nunito',sans-serif;text-transform:uppercase" oninput="calc()">
    </div>
  </div>

  <div class="card" style="padding:14px">
    <div style="position:relative;margin-bottom:10px">
      <input type="text" id="loc" placeholder="📍 ¿DÓNDE COMPRAS?" class="inp" style="color:var(--a5);font-weight:900;">
      <div id="sL" class="sug" style="display:none"></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px;position:relative">
      <div style="flex:7;position:relative">
        <input type="text" id="prod" placeholder="🛍 PRODUCTO..." class="inp">
        <div id="sP" class="sug" style="display:none"></div>
      </div>
      <input type="tel" id="cant" placeholder="×" class="inp" style="flex:3;text-align:center;color:var(--a2);font-size:22px;font-weight:900;">
    </div>
    <div id="cb" style="display:none;background:linear-gradient(135deg,rgba(255,210,63,0.15),rgba(255,107,53,0.1));border:1.5px solid rgba(255,210,63,0.5);border-radius:12px;padding:10px 13px;margin-bottom:10px;align-items:center;gap:8px">
      <span style="font-size:18px">💡</span>
      <p id="ct" style="font-size:11px;font-weight:900;color:var(--a2);text-transform:uppercase;font-style:italic"></p>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div style="position:relative"><span style="position:absolute;left:13px;top:13px;color:var(--a1);font-weight:900;font-size:16px">$</span><input type="tel" id="iU" placeholder="0.00" class="inp" style="padding-left:28px;color:var(--a1);text-align:center;font-size:17px;font-weight:900;"></div>
      <div style="position:relative"><span style="position:absolute;left:13px;top:14px;color:var(--a3);font-weight:900;font-size:12px">Bs</span><input type="tel" id="iB" placeholder="0.00" class="inp" style="padding-left:36px;color:var(--a3);text-align:center;font-size:17px;font-weight:900;"></div>
    </div>
    <button onclick="add()" class="btn btn-blue" style="font-size:15px;padding:16px;letter-spacing:1px">➕ Agregar al Carrito</button>
  </div>
  <div id="lista"></div>
</div>

<!-- ══ LISTA ══ -->
<div id="secPlan" class="tab">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <h1 style="font-size:26px;font-weight:900;background:linear-gradient(135deg,#ff6b35,#ffd23f);-webkit-background-clip:text;-webkit-text-fill-color:transparent">📋 Faltantes</h1>
    <button onclick="sa('¿LIMPIAR?','Se borrará la lista.',function(){sDB('plan_v1',[]);rPlan();})" style="background:rgba(255,60,60,0.15);border:1.5px solid rgba(255,60,60,0.5);color:#ff3b30;font-size:10px;font-weight:900;text-transform:uppercase;cursor:pointer;padding:7px 13px;border-radius:20px;font-family:'Nunito',sans-serif">🗑 Vaciar</button>
  </div>
  <div class="card" style="padding:14px">
    <div style="position:relative;margin-bottom:12px">
      <input type="text" id="iP" placeholder="¿QUÉ NECESITAS?" class="inp" style="text-align:center;font-size:17px;">
      <div id="sPl" class="sug" style="display:none"></div>
    </div>
    <button onclick="addPlan()" class="btn btn-orange" style="font-size:15px;padding:16px">📌 Anotar en lista</button>
  </div>
  <div id="listaPlan" style="margin-top:10px"></div>
</div>

<!-- ══ HISTORIAL ══ -->
<div id="secHist" class="tab">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
    <h1 style="font-size:26px;font-weight:900;background:linear-gradient(135deg,#00b4d8,#06d6a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🧾 Historial</h1>
    <button onclick="sa('¿BORRAR TODO?','Se elimina el historial.',function(){sDB('hist_v1',[]);rHist();})" style="background:rgba(255,60,60,0.15);border:1.5px solid rgba(255,60,60,0.5);color:#ff3b30;font-size:10px;font-weight:900;text-transform:uppercase;cursor:pointer;padding:7px 13px;border-radius:20px;font-family:'Nunito',sans-serif">🗑 Borrar todo</button>
  </div>
  <div id="listaH"></div>
</div>

<!-- FOOTER -->
<div class="foot" id="foot">
  <div>
    <p style="font-size:9px;font-weight:900;color:var(--sub);text-transform:uppercase;letter-spacing:1px">Gasto Total</p>
    <p id="tG" style="font-size:22px;font-weight:900;color:var(--a3);line-height:1">0,00 Bs</p>
    <p id="tU" style="font-size:12px;font-weight:800;color:var(--a1);font-style:italic">0,00 $</p>
  </div>
  <button onclick="fin()" class="btn btn-green" style="width:auto;padding:14px 22px;font-size:12px;letter-spacing:.5px">✅ Cerrar Compra</button>
</div>

<!-- NAV -->
<nav class="nav">
  <div onclick="vT('Calc')" id="tC" class="ni on">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM17 18c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2zM7.17 14.75l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.86-7.01L19.42 4H5.21l-.94-2H1v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25z"/></svg>
    <span>Mercado</span><div class="dot"></div>
  </div>
  <div onclick="vT('Plan')" id="tP" class="ni">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
    <span>Lista</span><div class="dot"></div>
  </div>
  <div onclick="vT('Hist')" id="tH" class="ni">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
    <span>Historial</span><div class="dot"></div>
  </div>
</nav>

<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(function(){});

/* ── MODO ── */
var darkMode=localStorage.getItem('mm_dark')!=='false';
function applyMode(){
  document.body.classList.toggle('light',!darkMode);
  var btn=document.getElementById('modeBtn');
  if(btn)btn.textContent=darkMode?'🌙':'☀️';
  document.querySelector('meta[name="theme-color"]').content=darkMode?'#0a0a15':'#e8edf8';
}
function toggleMode(){darkMode=!darkMode;localStorage.setItem('mm_dark',darkMode);applyMode();}
applyMode();

/* ── PWA ── */
var dp=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;document.getElementById('ib').style.display='flex';});
function instApp(){if(!dp)return;dp.prompt();dp.userChoice.then(function(){dp=null;hideIB();});}
function hideIB(){document.getElementById('ib').style.display='none';}

/* ── DATOS ── */
var carrito=[],mon='USD';
var EM={'ARROZ':'🍚','LECHE':'🥛','HUEVO':'🥚','QUESO':'🧀','POLLO':'🍗','CARNE':'🥩','PAN':'🍞','PASTA':'🍝','HARINA':'🌽','CAFE':'☕','AZUCAR':'🍬','AGUA':'💧','PAPA':'🥔','CEBOLLA':'🧅','TOMATE':'🍅'};
var LF=["UNICASA","FORUM","CENTRAL MADEIRENSE","PLAZA'S","GAMA","FARMATODO","SAN DIEGO","MARAPLUS","HIPER LIDER"];
function gDB(k){try{return JSON.parse(localStorage.getItem(k))||[];}catch(e){return[];}}
function sDB(k,v){localStorage.setItem(k,JSON.stringify(v));}
function fm(n){return parseFloat(n).toLocaleString('es-VE',{minimumFractionDigits:2,maximumFractionDigits:2});}

/* ── PREDICCIÓN ── */
function bMP(txt){
  var q=String(txt||'').trim().toUpperCase();if(!q)return null;
  var wds=q.split(' ').filter(function(w){return w.length>1;});
  var min=Infinity,locs=[],fecha='';
  function match(n){n=String(n||'').trim().toUpperCase();if(!n)return false;if(n===q||n.indexOf(q)!==-1||q.indexOf(n)!==-1)return true;for(var i=0;i<wds.length;i++)if(n.indexOf(wds[i])!==-1)return true;return false;}
  function ev(it,f){if(!it||!it.nombre||!match(it.nombre))return;var p=parseFloat(it.uUSD);if(isNaN(p)||p<=0)return;var l=String(it.local||'GENERAL').toUpperCase();if(p<min){min=p;locs=[l];fecha=f||'';}else if(Math.abs(p-min)<0.001&&locs.indexOf(l)===-1)locs.push(l);}
  var h=gDB('hist_v1');for(var i=0;i<h.length;i++){var c=h[i];if(c&&c.items)for(var j=0;j<c.items.length;j++)ev(c.items[j],c.fecha);}
  for(var k=0;k<carrito.length;k++)ev(carrito[k],'Compra actual');
  return min===Infinity?null:{precio:min,locs:locs,fecha:fecha};
}
function sugs(v){if(!v)return[];var g=gDB('prods_v1');var all=Object.keys(EM).concat(g).filter(function(x,i,a){return a.indexOf(x)===i;});return all.filter(function(p){return p.indexOf(v)!==-1;});}

/* ── ALERTA ── */
var pa=null;
function sa(t,m,fn){document.getElementById('at').innerText=t;document.getElementById('am').innerText=m;document.getElementById('ov').style.display='flex';pa=fn;}
function ca(ok){document.getElementById('ov').style.display='none';if(ok&&pa)pa();pa=null;}
document.getElementById('bc').onclick=function(){ca(1);};

/* ── BCV ── */
function getBCV(){
  var ic=document.getElementById('ri');ic.classList.add('spin');
  fetch('https://ve.dolarapi.com/v1/dolares/oficial').then(function(r){return r.json();}).then(function(d){if(d&&d.promedio){document.getElementById('tasa').value=d.promedio.toFixed(2).replace('.',',');calc();}}).catch(function(){}).finally(function(){setTimeout(function(){ic.classList.remove('spin');},600);});
}
getBCV();setInterval(getBCV,5*60*1000);

/* ── SUGERENCIAS ── */
document.getElementById('loc').addEventListener('input',function(e){
  var v=e.target.value.toUpperCase(),box=document.getElementById('sL');if(!v){box.style.display='none';return;}
  var all=LF.concat(gDB('locs_v1')).filter(function(x,i,a){return a.indexOf(x)===i;});
  var m=all.filter(function(l){return l.indexOf(v)!==-1;});if(!m.length){box.style.display='none';return;}
  box.innerHTML=m.map(function(x){return'<div class="si" onclick="sLoc(\''+x+'\')">📍 '+x+'</div>';}).join('');box.style.display='block';
});
function sLoc(v){document.getElementById('loc').value=v;document.getElementById('sL').style.display='none';}

document.getElementById('prod').addEventListener('input',function(e){
  var v=e.target.value.toUpperCase();var sb=document.getElementById('sP'),cb=document.getElementById('cb'),ct=document.getElementById('ct');
  if(!v){sb.style.display='none';cb.style.display='none';return;}
  var r=bMP(v);if(r){cb.style.display='flex';ct.innerText='Mejor precio: $'+fm(r.precio)+' en '+r.locs.join(' / ');}else{cb.style.display='none';}
  var m=sugs(v);if(!m.length){sb.style.display='none';return;}
  sb.innerHTML=m.map(function(x){return'<div class="si" onclick="sProd(\''+x+'\')"><span style="font-size:18px">'+(EM[x]||'📦')+'</span><span style="color:var(--text)">'+x+'</span></div>';}).join('');sb.style.display='block';
});
function sProd(v){document.getElementById('prod').value=v;document.getElementById('sP').style.display='none';document.getElementById('cant').focus();}

document.getElementById('iP').addEventListener('input',function(e){
  var v=e.target.value.toUpperCase(),sp=document.getElementById('sPl');if(!v){sp.style.display='none';return;}
  var m=sugs(v);if(!m.length){sp.style.display='none';return;}
  sp.innerHTML=m.map(function(x){var r=bMP(x);var p=r?'<span style="color:var(--a2);font-weight:900;margin-left:6px;font-size:13px">$'+fm(r.precio)+'</span>':'';return'<div class="si" onclick="sPlan(\''+x+'\')"><span style="font-size:18px">'+(EM[x]||'📦')+'</span><span style="color:var(--text)">'+x+p+'</span></div>';}).join('');sp.style.display='block';
});
function sPlan(v){document.getElementById('iP').value=v;document.getElementById('sPl').style.display='none';}

/* ── CARRITO ── */
function add(){
  var p=document.getElementById('prod').value.toUpperCase().trim();
  var l=document.getElementById('loc').value.toUpperCase().trim()||'GENERAL';
  var c=parseFloat(document.getElementById('cant').value)||1;
  var t=parseFloat(document.getElementById('tasa').value.replace(',','.'))||1;
  var vU=document.getElementById('iU').value.replace(',','.');
  var vB=document.getElementById('iB').value.replace(',','.');
  if(!p||(!vU&&!vB))return;
  sDB('locs_v1',LF.concat(gDB('locs_v1')).concat([l]).filter(function(x,i,a){return a.indexOf(x)===i;}));
  sDB('prods_v1',gDB('prods_v1').concat([p]).filter(function(x,i,a){return a.indexOf(x)===i;}));
  var uU=vU?parseFloat(vU):parseFloat(vB)/t;var uB=vB?parseFloat(vB):parseFloat(vU)*t;
  carrito.push({id:Date.now(),nombre:p,local:l,cant:c,uUSD:uU,uBS:uB,tUSD:uU*c,tBS:uB*c});
  document.getElementById('prod').value='';document.getElementById('iU').value='';document.getElementById('iB').value='';document.getElementById('cant').value='';
  calc();
}

function calc(){
  var t=parseFloat(document.getElementById('tasa').value.replace(',','.'))||1;
  var pre=parseFloat(document.getElementById('presu').value.replace(',','.'))||0;
  var tU=0,tB=0,html='',grupos={};
  carrito.forEach(function(i){if(!grupos[i.local])grupos[i.local]=[];grupos[i.local].push(i);tU+=i.tUSD;tB+=i.tBS;});
  for(var loc in grupos){
    html+='<div class="gh">📍 '+loc+'</div>';
    grupos[loc].forEach(function(i){
      html+='<div class="card" style="margin:0 4px 8px;padding:13px;border-left:3px solid var(--a5)">'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
        +'<p style="font-weight:900;font-size:15px;color:var(--text)">'+(EM[i.nombre]||'📦')+' '+i.nombre+' <span style="color:var(--sub);font-size:12px">×'+i.cant+'</span></p>'
        +'<button onclick="del('+i.id+')" style="background:rgba(255,60,60,0.15);border:1.5px solid rgba(255,60,60,0.5);color:#ff3b30;font-size:14px;cursor:pointer;padding:3px 9px;border-radius:8px;font-weight:900">✕</button>'
        +'</div>'
        +'<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'
        +'<div style="display:flex;gap:6px">'
        +'<span class="badge badge-o">$'+fm(i.uUSD)+'</span>'
        +'<span class="badge badge-g">'+fm(i.uBS)+' Bs</span>'
        +'</div>'
        +'<div style="text-align:right"><p style="font-weight:900;font-size:20px;color:var(--text)">$'+fm(i.tUSD)+'</p><p style="font-size:12px;color:var(--a3);font-weight:900">'+fm(i.tBS)+' Bs</p></div>'
        +'</div></div>';
    });
  }
  document.getElementById('lista').innerHTML=html;
  var pU=mon==='USD'?pre:pre/t,sU=pU-tU;
  document.getElementById('ds').innerText=mon==='USD'?fm(sU):fm(sU*t);
  document.getElementById('de').innerText=mon==='USD'?fm(sU*t)+' Bs':fm(sU)+' $';
  document.getElementById('tG').innerText=fm(tB)+' Bs';
  document.getElementById('tU').innerText=fm(tU)+' $';
}

function setM(m){
  mon=m;var isU=m==='USD';
  document.getElementById('bU').style.cssText='flex:1;padding:9px;border-radius:11px;font-size:11px;font-weight:900;border:none;text-transform:uppercase;cursor:pointer;font-family:\'Nunito\',sans-serif;'+(isU?'background:linear-gradient(135deg,#ff6b35,#ffd23f);color:#1a0a00;box-shadow:0 2px 10px rgba(255,107,53,0.5)':'background:transparent;color:var(--sub)');
  document.getElementById('bB').style.cssText='flex:1;padding:9px;border-radius:11px;font-size:11px;font-weight:900;border:none;text-transform:uppercase;cursor:pointer;font-family:\'Nunito\',sans-serif;'+(!isU?'background:linear-gradient(135deg,#06d6a0,#00956e);color:#fff;box-shadow:0 2px 10px rgba(6,214,160,0.5)':'background:transparent;color:var(--sub)');
  document.getElementById('hdr').style.background=isU?'linear-gradient(135deg,#ff6b35 0%,#ffd23f 50%,#ff6b35 100%)':'linear-gradient(135deg,#06d6a0 0%,#0077b6 50%,#06d6a0 100%)';
  calc();
}

function fin(){
  if(!carrito.length)return;
  var h=gDB('hist_v1');
  h.unshift({id:Date.now(),fecha:new Date().toLocaleString(),tasa:document.getElementById('tasa').value,pI:document.getElementById('presu').value,mon:mon,items:carrito.slice(),tBS:document.getElementById('tG').innerText,tUSD:document.getElementById('tU').innerText,sobro:document.getElementById('ds').innerText+(mon==='USD'?' $':' Bs')});
  sDB('hist_v1',h);carrito=[];document.getElementById('presu').value='';calc();vT('Hist');
}

/* ── HISTORIAL DESPLEGABLE CON BORRADO INDIVIDUAL ── */
function toggleHist(id){
  var body=document.getElementById('hb-'+id);var arrow=document.getElementById('ha-'+id);
  if(!body)return;
  var open=body.classList.contains('open');
  body.classList.toggle('open',!open);arrow.classList.toggle('open',!open);
}

function borrarCompra(id){
  sa('¿BORRAR ESTA COMPRA?','Solo se elimina esta compra del historial.',function(){
    var h=gDB('hist_v1');
    sDB('hist_v1',h.filter(function(x){return x.id!==id;}));
    rHist();
  });
}

function rHist(){
  var h=gDB('hist_v1'),el=document.getElementById('listaH');
  if(!h.length){
    el.innerHTML='<div style="text-align:center;padding:50px 20px"><div style="font-size:50px;margin-bottom:12px">🧾</div><p style="font-weight:900;font-size:14px;text-transform:uppercase;color:var(--sub)">Sin compras guardadas</p></div>';
    return;
  }
  var out='';
  for(var i=0;i<h.length;i++){
    var co=h[i],totalItems=co.items?co.items.length:0,rows='';
    if(co.items){
      for(var j=0;j<co.items.length;j++){
        var it=co.items[j];
        rows+='<tr>'
          +'<td style="padding:9px 4px;border-bottom:1px solid var(--border);vertical-align:top;font-size:10px"><b style="text-transform:uppercase;color:var(--text);font-size:11px">'+it.nombre+'</b><br><span style="color:var(--a5);font-style:italic;font-size:9px;font-weight:800">📍 '+it.local+'</span></td>'
          +'<td style="padding:9px 4px;border-bottom:1px solid var(--border);font-weight:900;text-align:center;font-size:11px;color:var(--sub)">×'+it.cant+'</td>'
          +'<td style="padding:9px 4px;border-bottom:1px solid var(--border);font-size:10px"><span style="color:var(--a1);font-weight:900">$'+fm(it.uUSD)+'</span><br><span style="color:var(--a3);font-weight:900">'+fm(it.uBS)+'B</span></td>'
          +'<td style="padding:9px 4px;border-bottom:1px solid var(--border);text-align:right"><b style="font-size:14px;color:var(--text)">$'+fm(it.tUSD)+'</b><br><span style="font-size:10px;color:var(--a3);font-weight:800">'+fm(it.tBS)+'B</span></td>'
          +'</tr>';
      }
    }
    out+='<div class="hist-item">'
      /* CABECERA */
      +'<div class="hist-head" onclick="toggleHist('+co.id+')">'
        +'<div style="flex:1;min-width:0">'
          +'<p style="font-size:10px;font-weight:900;color:var(--a5);text-transform:uppercase;letter-spacing:.5px">📅 '+co.fecha+'</p>'
          +'<p style="font-size:15px;font-weight:900;color:var(--text);margin-top:2px">'+co.tBS+' <span style="font-size:11px;color:var(--a1);font-weight:800">· '+co.tUSD+'</span></p>'
          +'<p style="font-size:9px;color:var(--sub);font-weight:800;margin-top:1px">'+totalItems+' producto'+(totalItems!==1?'s':'')+' · BCV '+co.tasa+'</p>'
        +'</div>'
        +'<span id="ha-'+co.id+'" class="hist-arrow">▼</span>'
      +'</div>'
      /* CUERPO */
      +'<div id="hb-'+co.id+'" class="hist-body">'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
          +'<div style="background:var(--inp-bg);border:1.5px solid var(--border);padding:11px;border-radius:14px"><p style="font-size:8px;font-weight:900;color:var(--sub);text-transform:uppercase;margin-bottom:4px">Presupuesto</p><p style="font-size:16px;font-weight:900;color:var(--text)">'+co.pI+' '+co.mon+'</p></div>'
          +'<div style="background:rgba(6,214,160,0.1);border:1.5px solid rgba(6,214,160,0.35);padding:11px;border-radius:14px"><p style="font-size:8px;font-weight:900;color:var(--a3);text-transform:uppercase;margin-bottom:4px">Gasto Total</p><p style="font-size:16px;font-weight:900;color:var(--a3)">'+co.tBS+'</p></div>'
        +'</div>'
        +'<table style="width:100%;border-collapse:collapse;margin-bottom:14px"><tbody>'+rows+'</tbody></table>'
        +'<div style="background:linear-gradient(135deg,#0077b6,#00b4d8);padding:13px 16px;border-radius:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'
          +'<span style="font-size:10px;font-weight:900;text-transform:uppercase;color:rgba(255,255,255,0.9)">💰 Saldo Restante</span>'
          +'<span style="font-size:24px;font-weight:900;color:#fff">'+co.sobro+'</span>'
        +'</div>'
        +'<div style="display:flex;gap:8px">'
          +'<button onclick="recup('+co.id+')" class="btn" style="flex:1;padding:13px;background:linear-gradient(135deg,#ff8c00,#cc5500);box-shadow:0 4px 16px rgba(255,140,0,0.4);font-size:11px">↩ Editar</button>'
          +'<button onclick="wapp('+co.id+')" class="btn" style="flex:1;padding:13px;background:linear-gradient(135deg,#25d366,#108040);box-shadow:0 4px 16px rgba(37,211,102,0.4);font-size:11px">📲 WhatsApp</button>'
          +'<button onclick="borrarCompra('+co.id+')" class="btn" style="width:auto;padding:13px 14px;background:linear-gradient(135deg,#ff3b30,#cc0000);box-shadow:0 4px 16px rgba(255,59,48,0.4);font-size:14px">🗑</button>'
        +'</div>'
      +'</div>'
    +'</div>';
  }
  el.innerHTML=out;
}

function recup(id){
  var h=gDB('hist_v1');
  for(var i=0;i<h.length;i++){if(h[i].id===id){carrito=h[i].items.slice();document.getElementById('presu').value=h[i].pI;setM(h[i].mon);sDB('hist_v1',h.filter(function(x){return x.id!==id;}));vT('Calc');calc();return;}}
}

/* ── LISTA FALTANTES ── */
function addPlan(){
  var v=document.getElementById('iP').value.toUpperCase().trim();if(!v)return;
  var p=gDB('plan_v1');for(var i=0;i<p.length;i++)if(p[i].n===v)return;
  p.push({id:Date.now(),n:v});sDB('plan_v1',p);
  sDB('prods_v1',gDB('prods_v1').concat([v]).filter(function(x,i,a){return a.indexOf(x)===i;}));
  document.getElementById('iP').value='';document.getElementById('sPl').style.display='none';rPlan();
}

        +'<span style="font-size:18px">🏷️</span><div>'
        +'<p style="font-size:9px;font-weight:900;color:var(--a5);text-transform:uppercase;letter-spacing:.5px">Mejor precio visto</p>'
        +'<p style="font-size:15px;font-weight:900;color:var(--a2)">$'+fm(r.precio)+' <span style="font-size:10px;color:var(--sub);font-weight:800">en '+r.locs.join(' / ')+fc+'</span></p>'
        +'</div></div>';
    }else{
      tag='<p style="font-size:10px;color:var(--sub);font-style:italic;text-transform:uppercase;margin-top:7px;font-weight:800">📊 Agrega al carrito para ver precio</p>';
    }
    html+='<div class="card" style="padding:13px 14px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px">'
      +'<div style="flex:1"><p style="font-weight:900;font-size:17px;text-transform:uppercase;color:var(--text)">'+(EM[nom]||'📦')+' '+nom+'</p>'+tag+'</div>'
      +'<button onclick="delPlan('+it.id+')" style="background:rgba(255,60,60,0.15);border:1.5px solid rgba(255,60,60,0.5);color:#ff3b30;font-size:15px;font-weight:900;padding:6px 11px;border-radius:10px;cursor:pointer;flex-shrink:0;margin-top:2px;font-family:\'Nunito\',sans-serif">✕</button>'

function delPlan(id){sDB('plan_v1',gDB('plan_v1').filter(function(i){return i.id!==id;}));rPlan();}

/* ── WHATSAPP ── */
function wapp(id){
  var h=gDB('hist_v1');
  for(var i=0;i<h.length;i++){if(h[i].id===id){var c=h[i],msg='🛒 *COMPRA MANU*\n📅 '+c.fecha+'\n💵 Tasa: '+c.tasa+'\n------------------\n';c.items.forEach(function(it){msg+='• *'+it.nombre+'* ('+it.local+') ×'+it.cant+' → $'+fm(it.tUSD)+'\n';});msg+='------------------\n💰 *TOTAL:* '+c.tUSD+' / '+c.tBS+'\n✅ *SALDO:* '+c.sobro;window.open('https://wa.me/?text='+encodeURIComponent(msg));return;}}

/* ── NAV ── */
function del(id){carrito=carrito.filter(function(i){return i.id!==id;});calc();}
function vT(t){
  ['Calc','Plan','Hist'].forEach(function(x){document.getElementById('sec'+x).classList.remove('on');document.getElementById('t'+x[0]).classList.remove('on');});
  document.getElementById('sec'+t).classList.add('on');document.getElementById('t'+t[0]).classList.add('on');
  document.getElementById('foot').style.display=t==='Calc'?'flex':'none';
  if(t==='Plan')rPlan();if(t==='Hist')rHist();
}

/* ── VACIAR TODO ── */
function vaciarTodo(){
  carrito=[];
  ['presu','loc','prod','cant','iU','iB'].forEach(function(id){document.getElementById(id).value='';});
  ['sL','sP','cb'].forEach(function(id){document.getElementById(id).style.display='none';});
  calc();
}

/* ── BLOQUEAR PULL-TO-REFRESH SIN BLOQUEAR SCROLL ── */
var lastY=0;
document.addEventListener('touchstart',function(e){lastY=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchmove',function(e){
  var y=e.touches[0].clientY,scrollable=false,node=e.target;
  while(node&&node!==document.body){
    if(node.scrollHeight>node.offsetHeight){if((y>lastY&&node.scrollTop>0)||(y<lastY&&node.scrollTop<node.scrollHeight-node.offsetHeight)){scrollable=true;break;}}
    node=node.parentNode;
  }
  if(!scrollable&&y>lastY&&window.scrollY===0){e.preventDefault();}
  lastY=y;
},{passive:false});

/* ── SWIPE ENTRE PESTAÑAS ── */
var tabs=['Calc','Plan','Hist'],swipeX=0,swipeY=0,swiping=false;
document.addEventListener('touchstart',function(e){swipeX=e.touches[0].clientX;swipeY=e.touches[0].clientY;swiping=true;},{passive:true});
document.addEventListener('touchend',function(e){
  if(!swiping)return;swiping=false;
  var dx=e.changedTouches[0].clientX-swipeX,dy=e.changedTouches[0].clientY-swipeY;
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
  var cur=tabs.findIndex(function(t){return document.getElementById('sec'+t).classList.contains('on');});
  if(dx<0&&cur<tabs.length-1)vT(tabs[cur+1]);else if(dx>0&&cur>0)vT(tabs[cur-1]);
},{passive:true});
